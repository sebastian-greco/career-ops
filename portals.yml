# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- Leadership-first roles --
    - "Director of Engineering"
    - "Engineering Director"
    - "Director, Engineering"
    - "Senior Engineering Manager"
    - "Senior Manager, Engineering"
    - "Engineering Manager"
    - "Software Engineering Manager"
    - "Platform Engineering Manager"
    - "Backend Engineering Manager"
    - "Head of Engineering"
    - "Head of Platform"
    - "Head of Backend"
    - "Head of AI Products"
    - "Head of Agentic Products"
    - "Director of Platform Engineering"
    - "Director of Software Engineering"
    - "Director of AI Products"
    - "Director of Agentic Products"
    # -- Selective frontier IC roles --
    - "Principal Engineer"
    - "Staff Engineer"
    - "Principal Software Engineer"
    - "Staff Software Engineer"
    - "Principal Platform Engineer"
    - "Staff Platform Engineer"
    - "Principal Backend Engineer"
    - "Staff Backend Engineer"
    - "Principal Product Engineer"
    - "Staff Product Engineer"
    - "Senior Software Engineer, Agents"
    - "Senior Software Engineer, Agent"
    - "Senior Software Engineer, Agentic"
    - "Senior Software Engineer, AI Agent"
    - "Senior Software Engineer, AI Agents"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java"
    - "C#"
    - "C Sharp"
    - "iOS"
    - "Android"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Product Manager"
    - "Technical PM"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    - "Developer Advocate"
    - "Developer Relations"
    - "DevRel"
    - "Founding Engineer"
    - "Machine Learning"
    - "ML"
    - "MLOps"
    - "Applied AI"
    - "Applied Scientist"
    - "Research Scientist"
    - "Research Engineer"
    - "Data Scientist"
    - "AI Research"
    - "Computer Vision"
    - "Robotics"
    - "Bioinformatics"
    - "Protein"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Leadership-first engineering roles --
  - name: Ashby — Engineering Leadership
    query: 'site:jobs.ashbyhq.com "Director of Engineering" OR "Engineering Director" OR "Senior Engineering Manager" OR "Head of Engineering" remote'
    enabled: true

  - name: Greenhouse — Engineering Leadership
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Director of Engineering" OR "Engineering Director" OR "Senior Engineering Manager" OR "Head of Engineering" remote'
    enabled: true

  - name: Lever — Engineering Leadership
    query: 'site:jobs.lever.co "Director of Engineering" OR "Engineering Director" OR "Senior Engineering Manager" OR "Head of Engineering" remote'
    enabled: true

  - name: Cross-portal — Platform Leadership
    query: '"Platform Engineering Manager" OR "Director of Platform Engineering" OR "Backend Engineering Manager" OR "Head of Platform" remote'
    enabled: true

  - name: Cross-portal — LLM / Agentic Product Leadership
    query: '"Director of Engineering" OR "Senior Engineering Manager" OR "Head of Engineering" LLM OR agentic OR "AI product" remote'
    enabled: true

  - name: Cross-portal — Frontier Staff/Principal LLM Products
    query: '"Principal Engineer" OR "Staff Engineer" LLM OR agentic OR "AI product" OR "AI platform" remote'
    enabled: true

  - name: Cross-portal — Frontier Staff/Principal Crypto
    query: '"Principal Engineer" OR "Staff Engineer" crypto OR blockchain OR web3 remote'
    enabled: true

  - name: Cross-portal — Crypto Leadership
    query: '"Director of Engineering" OR "Engineering Director" OR "Senior Engineering Manager" OR "Head of Engineering" crypto OR blockchain OR web3 remote'
    enabled: true

  - name: Cross-portal — Product / Platform Leadership Europe
    query: '"Director of Engineering" OR "Senior Engineering Manager" OR "Head of Engineering" platform OR backend OR product remote Europe'
    enabled: true

  - name: Cross-portal — Nordic Engineering Leadership
    query: '"Director of Engineering" OR "Senior Engineering Manager" OR "Head of Engineering" Sweden OR Denmark OR Norway OR Finland remote'
    enabled: true

  - name: Cross-portal — Switzerland / DACH Healthy Pace
    query: '"Director of Engineering" OR "Senior Engineering Manager" OR "Head of Engineering" Switzerland OR Zurich OR Copenhagen OR Stockholm OR Helsinki remote'
    enabled: true

  - name: Cross-portal — Flexible Remote Europe
    query: '"Director of Engineering" OR "Senior Engineering Manager" OR "Head of Engineering" "remote-first" OR "flexible hours" OR async Europe'
    enabled: true

